  - id: groq:llama-3.1-8b-instant
    config:
      temperature: 0.1
  # - id: groq:openai/gpt-oss-20b
  #   config:
  #     temperature: 0.1
  #     reasoning_effort: "low"
  #     reasoning_format: "hidden"
  #     response_format:
  #       type: json_object
  #     stream: false
  - id: groq:openai/gpt-oss-20b
    config:
      temperature: 0.1
      # Для модели GPT-OSS на Groq нужен именно этот флаг:
      include_reasoning: false
      reasoning_effort: "low"
      response_format:
        type: json_object
    # Эта строка найдёт первую { и последнюю }, вырезав весь "We need to output JSON..." текст до и после
    transformResponse: "output.substring(output.indexOf('{'), output.lastIndexOf('}') + 1)"
evaluateOptions:
  maxConcurrency: 1
  delay: 8000

tests:
  - file://cases.yaml


