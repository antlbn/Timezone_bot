# ============================================================
# [EDGE] День недели вместо времени — реальный баг из Telegram логов
# Сценарий: бот ставил "воскресенье" в поле time → выводил 00:00
# Ожидаем: time в points должен быть числовым HH:MM, НЕ названием дня
# ============================================================

- description: "[EDGE][REGRESSION] 'печка' — weekday 'воскресенье' must NOT be extracted as time"
  vars:
    sender_id: "1201"
    sender_name: "Vlad"
    author: "Vlad"
    text: "давайте поставим печку на воскресенье, кто за?"
    history: |
      [Anton, 10m ago]: ребят, нужно обсудить релиз
      [Masha, 4m ago]: +1, когда?
    timestamp: "2026-03-16T15:00:00Z"
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output.replace(/```json\n?|```/g, '').trim());
        // event=false (нет конкретного времени) OR event=true но time должен быть HH:MM
        // В любом случае "воскресенье" НЕ должно попасть в поле time
        const hasWeekdayAsTime = data.points && data.points.some(p =>
          p.time && /воскресенье|понедельник|вторник|среда|четверг|пятница|суббота/i.test(p.time)
        );
        const allTimesAreNumeric = !data.points || data.points.every(p =>
          !p.time || /^\d{1,2}:\d{2}$/.test(p.time)
        );
        return !hasWeekdayAsTime && allTimesAreNumeric;

- description: "[EDGE][REGRESSION] 'пицца в день после субботы' — Sunday reference must not become 00:00"
  vars:
    sender_id: "1202"
    sender_name: "Anton"
    author: "Anton"
    text: "Воскресенье встреча всех выпускников психоневрологического"
    history: |
      [Vlad, 6m ago]: То что он начал воскресенье пихать
      [Vlad, 2m ago]: Пицца в день после субботы
    timestamp: "2026-03-16T15:05:00Z"
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output.replace(/```json\n?|```/g, '').trim());
        // Нет конкретного времени → event=false
        // Либо если event=true: time НЕ должен быть "00:00" (артефакт парсинга дня)
        const hasSpuriousZero = data.points && data.points.some(p => p.time === '00:00');
        const hasWeekdayAsTime = data.points && data.points.some(p =>
          p.time && /воскресенье|понедельник|вторник|среда|четверг|пятница|суббота/i.test(p.time)
        );
        return !hasSpuriousZero && !hasWeekdayAsTime;


