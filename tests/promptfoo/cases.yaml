# ============================================================
# [STRESS] Стресс-тест
# ============================================================

- description: "[STRESS] Massive history (EN) + tired message with typos — 3 events, ignoring history times"
  vars:
    sender_id: "601"
    sender_name: "Anton"
    author: "Anton"
    text: "Man sry for writing so late im just buried in work and my brain is fried anyway about the loogistics call lets do thursdsy at 10:30 instead of half past nine as suggested coz i wont make it from the airport and also we really need to talk about the investor deck on Friday at 1 PM thats super critical and also remind me pls what about the code deadline on Monday by 5 PM are we on track? i am literally falling asleep here..."
    history: |
      [Dima]: Hey colleagues, I was looking at our yesterday's sync from 9:00 AM and realized we have a massive workload ahead. Especially with the Munich logistics project we discussed last Friday at 4 PM. We should try to discuss everything this Wednesday around 2 PM if everyone is free.
      [Elena]: Agree, Dima. That project takes a lot of time. I remember we had a session at 11 AM about it. I can't do Wednesday at 2 because of a legal call at 2:30. How about Thursday morning, say half past nine, so we can cover everything?
    timestamp: "2026-03-13T22:00:00Z"
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output.replace(/```json\n?|```/g, '').trim());
        const has1030 = data.points.some(p => p.time === '10:30');
        const has1300 = data.points.some(p => p.time === '13:00');
        const has1700 = data.points.some(p => p.time === '17:00');
        const ignoreHistory = !data.points.some(p => p.time === '09:00') && !data.points.some(p => p.time === '16:00') && !data.points.some(p => p.time === '14:00') && !data.points.some(p => p.time === '11:00') && !data.points.some(p => p.time === '14:30') && !data.points.some(p => p.time === '09:30');
        return data.event === true && has1030 && has1300 && has1700 && ignoreHistory;


