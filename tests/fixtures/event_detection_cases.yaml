        author_id: "u2"
        author_name: "Bob"
        timestamp_utc: "2026-03-04T09:58:00Z"
        text: "не, давай поближе к проходной"
      - platform: telegram
        chat_id: "-1009"
        message_id: "t3"
        author_id: "u3"
        author_name: "Sergey"
        timestamp_utc: "2026-03-04T09:59:00Z"
