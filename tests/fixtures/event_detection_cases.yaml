cases:
  - id: simple_future_meeting_single_message
    description: "Simple future meeting phrase should trigger immediately on first message"
    sender_timezone_iana: "Europe/Berlin"
    anchor_timestamp_utc: "2026-03-04T10:00:00Z"
    messages:
      - platform: telegram
        chat_id: "-1001"
        message_id: "t1"
        author_id: "u1"
        author_name: "Alice"
        timestamp_utc: "2026-03-04T09:58:00Z"
        text: "давайте завтра в 7 вечера созвон"
    expected:
      trigger: true
      polarity: positive

  - id: question_with_concrete_proposal
    description: "Question about time followed by a concrete useful proposal (should trigger)"
    sender_timezone_iana: "Europe/Berlin"
    anchor_timestamp_utc: "2026-03-04T10:00:00Z"
    messages:
      - platform: discord
        chat_id: "g1"
        message_id: "d1"
        author_id: "u1"
        author_name: "Alice"
        timestamp_utc: "2026-03-04T09:58:00Z"
        text: "как думаете во сколько нужно созвониться?"
      - platform: discord
        chat_id: "g1"
        message_id: "d2"
        author_id: "u2"
        author_name: "Bob"
        timestamp_utc: "2026-03-04T09:59:00Z"
        text: "в 8:00 по лондону?"
    expected:
      trigger: true
      polarity: positive

  - id: tentative_negotiation
    description: "Negotiation / counterproposal with bare numeric times, decision useful for group"
    sender_timezone_iana: "Europe/Berlin"
    anchor_timestamp_utc: "2026-03-04T10:00:00Z"
