      - platform: telegram
        chat_id: "-1002"
        message_id: "t1"
        author_id: "u1"
        author_name: "Alice"
        timestamp_utc: "2026-03-04T09:58:00Z"
        text: "в 8 норм?"
      - platform: telegram
        chat_id: "-1002"
        message_id: "t2"
        author_id: "u2"
        author_name: "Bob"
        timestamp_utc: "2026-03-04T09:59:00Z"
        text: "да нет давайте в 10"
    expected:
      trigger: true
      polarity: positive

