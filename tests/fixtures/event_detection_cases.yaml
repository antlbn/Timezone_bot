        message_id: "t1"
        author_id: "u1"
        author_name: "Alice"
        timestamp_utc: "2026-03-04T09:57:00Z"
        text: "во сколько с утра созвон?"
      - platform: telegram
        chat_id: "-1008"
        message_id: "t2"
        author_id: "u2"
        author_name: "Bob"
        timestamp_utc: "2026-03-04T09:58:00Z"
        text: "пусть Сергей решает"
      - platform: telegram
        chat_id: "-1008"
        message_id: "t3"
        author_id: "u3"
        author_name: "Sergey"
        timestamp_utc: "2026-03-04T09:59:00Z"
        text: "в 8 норм?"
    expected:
