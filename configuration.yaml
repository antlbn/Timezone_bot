# Project Configuration
app_name: timezone_bot
version: 0.1.0

# Logging Configuration
logging:
  # Levels: DEBUG, INFO, WARNING, ERROR
  level: DEBUG
  # Format: json or text (default: text)
  format: text

# Bot Settings
bot:
  # Maximum users to show in timezone conversion reply
  display_limit_per_chat: 0
  # Time format: "24h" or "12h"
  time_format: "24h"
  # Show usernames next to timezone (default: false)
  show_usernames: false
  # Cooldown between bot replies in same chat (0 = disabled)
  cooldown_seconds: 0

# Event Detection (LLM Layer)
# See: journal/14_llm_module.md
event_detection:
  # Master switch for the LLM-based scheduling detector
  enabled: true

  # LLM Temperature (0.0 = deterministic, 1.0 = creative)
  temperature: 0.1

  # Number of previous messages included in the LLM prompt (history snapshot).
  context_messages: 5

  # Protection against token limit exhaustion.
  # Messages longer than this are truncated before adding to deque/LLM.
  max_message_length_chars: 500
