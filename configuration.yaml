# Project Configuration
app_name: timezone_bot
version: 0.1.0

# Logging Configuration
logging:
  # Levels: DEBUG, INFO, WARNING, ERROR
  level: INFO
  # Format: json or text (default: text)
  format: text

# Bot Settings
bot:
  # Maximum users to show in timezone conversion reply
  display_limit_per_chat: 0
  # Time format: "24h" or "12h"
  time_format: "24h"
  # Show usernames next to timezone (default: false)
  show_usernames: false
  # Cooldown between bot replies in same chat (0 = disabled)
  cooldown_seconds: 0

# Event Detection (LLM Layer)
# See: journal/13_event_detection.md
event_detection:
  # Master switch for the LLM-based scheduling detector
  enabled: true

  # How many last messages to pass as context
  context_window_messages: 8

  # Prefilter to avoid calling LLM on every message
  prefilter:
    # If true: call LLM only when strict time-regex matched OR (numeric candidate + keyword) is present
    require_time_regex_or_keywords: true
    keywords_ru:
      - "созвон"
      - "встреч"
      - "бронь"
      - "мит"
      - "митинг"
      - "созван"
      - "давайте"
      - "завтра"
      - "сегодня"
      - "послезавтра"
      - "утром"
      - "вечером"
      - "перенес"
      - "перенос"
      - "по лондону"
      - "по москве"
    keywords_en:
      - "call"
      - "meeting"
      - "meet"
      - "sync"
      - "standup"
      - "stand-up"
      - "stand up"
      - "tomorrow"
      - "today"
      - "tonight"
      - "morning"
      - "evening"
      - "resched"
      - "reschedule"
      - "utc"
      - "mst"
      - "est"
      - "pst"

  # Regex for numeric candidate hours (used only for LLM prefilter)
  numeric_candidate_pattern: '\b([0-1]?[0-9]|2[0-3])\b'

  # Treat as trigger only if confidence >= threshold
  min_confidence_trigger: 0.75

# Time Capture Patterns (Strict Regex)
capture:
  patterns:
    # 24h format (e.g. 19:00, 9:30)
    - '\b([0-1]?[0-9]|2[0-3]):([0-5][0-9])\b'
    # 12h format with minutes (e.g. 5:00 pm, 10:30 AM)
    - '\b((1[0-2]|0?[1-9]):([0-5][0-9])\s?([AaPp][Mm]))\b'
    # 12h format without minutes (e.g. 5 pm, 10AM)
    - '\b((1[0-2]|0?[1-9])\s?([AaPp][Mm]))\b'
