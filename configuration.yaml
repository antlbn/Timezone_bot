# Project Configuration
app_name: timezone_bot
version: 0.1.0

# Logging Configuration
logging:
  # Levels: DEBUG, INFO, WARNING, ERROR
  level: INFO
  # Format: json or text (default: text)
  format: text

# Bot Settings
bot:
  # Maximum users to show in timezone conversion reply
  display_limit_per_chat: 0
  # Time format: "24h" or "12h"
  time_format: "24h"
  # Show usernames next to timezone (default: false)
  show_usernames: false
  # Cooldown between bot replies in same chat (0 = disabled)
  cooldown_seconds: 0

# Event Detection (LLM Layer)
# See: journal/13_event_detection.md
event_detection:
  # Master switch for the LLM-based scheduling detector
  enabled: true

  # Treat as trigger only if confidence >= threshold
  min_confidence_trigger: 0.75

  # Pass 1: LLM sees only the current message (no history).
  # Pass 2 (retry on low confidence): adds this many previous messages.
  extended_context_messages: 3

  # Protection against token limit exhaustion.
  # Messages longer than this are truncated before adding to deque/LLM.
  max_message_length_chars: 500

  # Prefilter: Optional regex/keyword gate to save LLM costs.
  # If enabled: LLM is only called if message matches patterns.
  prefilter:
    enabled: false
    # Common keywords related to coordination
    keywords:
      - "созвон"
      - "встреча"
      - "митинг"
      - "call"
      - "meeting"
      - "zoom"
      - "meet"
      - "завтра"
      - "tomorrow"
      - "сегодня"
      - "today"
    # Strict time regex (HH:MM or HH:MM AM/PM)
    strict_patterns:
      - "\\b([0-1]?[0-9]|2[0-3]):([0-5][0-9])\\b"
      - "\\b((1[0-2]|0?[1-9]):([0-5][0-9])\\s?([AaPp][Mm]))\\b"
    # Plain numeric candidate (e.g. "8", "19") - requires keywords to trigger
    numeric_candidate_pattern: "\\b([0-1]?[0-9]|2[0-3])\\b"
